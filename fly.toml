app = "ndkports"
primary_region = 'fra'

[build]
  image = "dzikoysk/reposilite:3.5.28"

[env]
  REPOSILITE_LOCAL_HOSTNAME = "0.0.0.0"
  REPOSILITE_LOCAL_PORT = "8080"
  JAVA_OPTS="-Xmx128M"

[[services]]
  protocol = "tcp"
  internal_port = 8080
  auto_stop_machines = 'suspend'
  auto_start_machines = true
  min_machines_running = 0

  [[services.ports]]
    port = 80
    handlers = ["http"]
  [[services.ports]]
    port = 443
    handlers = ["tls", "http"]

  [[services.tcp_checks]]
    interval = "30s"
    timeout = "5s"

[mounts]
  source = "reposilite_data"
  destination = "/app/data"

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
